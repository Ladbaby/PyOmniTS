name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v2.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to find previous tag

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate version input
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must match pattern vX.Y.Z (e.g., v2.1.0)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Find previous tag
        id: prev_tag
        run: |
          VERSION="${{ steps.validate.outputs.version }}"
          PREV_TAG=$(git tag -l --sort=-v:v | grep -v "^${VERSION}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "No previous tag found. Using root commit: $PREV_TAG"
          fi
          echo "prev=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          PREV_TAG: ${{ steps.prev_tag.outputs.prev_tag }}
          REPO: Ladbaby/PyOmniTS
        run: |
          python .github/generate_release_notes.py "$VERSION" "$PREV_TAG" "$REPO" > release_notes.md
          echo "Generated release notes:"
          cat release_notes.md

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "${{ steps.validate.outputs.version }}" 2>/dev/null || true
          git tag -a "${{ steps.validate.outputs.version }}" -m "Release ${{ steps.validate.outputs.version }}"
          git push origin "${{ steps.validate.outputs.version }}" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file release_notes.md \
            --target main
