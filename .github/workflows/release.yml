name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v2.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must match pattern vX.Y.Z (e.g., v2.1.0)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          bash .github/gen_release_notes.sh -v "${{ steps.validate.outputs.version }}"

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "${{ steps.validate.outputs.version }}" 2>/dev/null || true
          git tag -a "${{ steps.validate.outputs.version }}" -m "Release ${{ steps.validate.outputs.version }}"
          git push origin "${{ steps.validate.outputs.version }}" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.validate.outputs.version }}" \
            --title "${{ steps.validate.outputs.version }}" \
            --notes-file release.md \
            --target main
